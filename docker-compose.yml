version: "3.8"

services:
  acre-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./finetuning:/app/finetuning
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5-coder:1.5b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped